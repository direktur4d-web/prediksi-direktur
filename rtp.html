            { n: "MY LORD", img: "https://imgur.com/hO7PcaL.png", p: "Playstar" },
            { n: "FEATURE BUY・SUPER POWERFUL", img: "https://imgur.com/wFNZyne.png", p: "Playstar" },
            { n: "MADAME CAROLINE", img: "https://imgur.com/TF3Xdli.png", p: "Playstar" },
        ];

        let currentProvider = 'all';

        function getPolaItem(label) {
            const listAngka = [10, 20, 30, 40, 50, 70, 80, 100];
            const listStatus = ["ON", "OFF"];
            const listEmoji = ["✅", "❌"];
            return `${listAngka[Math.floor(Math.random() * listAngka.length)]} ${label} ${listStatus[Math.floor(Math.random() * listStatus.length)]} ${listEmoji[Math.floor(Math.random() * listEmoji.length)]}`;
        }

        function getJamAcak() {
            let startHour = Math.floor(Math.random() * 24);
            const pad = (n) => n.toString().padStart(2, '0');
            return `JAM ${pad(startHour)}:00 - ${pad((startHour+2)%24)}:00`;
        }

        function setProvider(provider, el) {
            currentProvider = provider;
            document.querySelectorAll('.btn-provider').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            const searchTerm = document.getElementById('searchGame').value.toLowerCase();
            const now = Date.now();
            let storedRtp = JSON.parse(localStorage.getItem('rtp_data_v22')) || {};
            let storedPola = JSON.parse(localStorage.getItem('pola_data_v22')) || {};
            let lastUpdate = localStorage.getItem('rtp_last_v22') || 0;

            if (now - lastUpdate > 600000 || Object.keys(storedRtp).length === 0) {
                gameMasterList.forEach(g => {
                    storedRtp[g.n] = { rtp: Math.floor(Math.random() * 70) + 30, jam: getJamAcak() };
                    storedPola[g.n] = { p1: getPolaItem("QUICK"), p2: getPolaItem("TURBO"), p3: getPolaItem("MANUAL") };
                });
                localStorage.setItem('rtp_last_v22', now);
                localStorage.setItem('rtp_data_v22', JSON.stringify(storedRtp));
                localStorage.setItem('pola_data_v22', JSON.stringify(storedPola));
            }

            let filtered = gameMasterList.filter(g => {
                const matchProvider = (currentProvider === 'all' || g.p === currentProvider);
                const matchSearch = g.n.toLowerCase().includes(searchTerm);
                return matchProvider && matchSearch;
            });

            filtered.sort((a, b) => {
                const rtpA = storedRtp[a.n] ? storedRtp[a.n].rtp : 0;
                const rtpB = storedRtp[b.n] ? storedRtp[b.n].rtp : 0;
                return rtpB - rtpA;
            });

            const container = document.getElementById('container-rtp');
            container.innerHTML = filtered.map((g, index) => {
                const rData = storedRtp[g.n] || {rtp: 77, jam: "JAM 12:00 - 14:00"};
                const pData = storedPola[g.n] || {p1:"10 QUICK ON ✅", p2:"20 TURBO OFF ❌", p3:"10 MANUAL ON ✅"};
                const badgeHot = index < 5 ? '<div class="badge-hot">🔥 HOT</div>' : '';
                return `
                    <div class="card">
                        ${badgeHot}  
                        <img src="${g.img}" alt="${g.n}" loading="lazy">
                        <div class="rtp-box">
                            <div class="rtp-fill" style="width: ${rData.rtp}%;"></div>
                            <div class="rtp-val">${rData.rtp}%</div>
                        </div>
                        <div class="details">
                            <span class="jam">${rData.jam}</span>
                            <div class="pola-item">${pData.p1}</div>
                            <div class="pola-item">${pData.p2}</div>
                            <div class="pola-item">${pData.p3}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        updateDisplay();
        setInterval(updateDisplay, 30000);
    </script>
</body>
</html>
